<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASSET Management</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="AssetPro">
    
    <!-- Web App Manifest (Inline for simplicity) -->
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIumGte2VqCDsnpDsgrAg6rSA66asIOyLnOyKpO2FnSIsCiAgInNob3J0X25hbWUiOiAiQXNzZXRQcm8iLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiI2Y4ZmFmYyIsCiAgInRoZW1lX2NvbG9yIjogIiMyNTYzZWIiLAogICJpY29ucyI6IFsKICAgIHsKICAgICAgInNyYyI6ICJodHRwczovL2Nkbi1pY29ucy1wbmcuZmxhdGljb24uY29tLzUxMi8yNjkzLzI2OTM1MDIucG5nIiwKICAgICAgInNpemVzIjogIjUxMng1MTIiLAogICAgICAidHlwZSI6ICJpbWFnZS9wbmciCiAgICB9CiAgXQp9">

    <!-- Tailwind CSS with Dark Mode config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; transition: background-color 0.3s ease; }
        .nav-active { border-bottom: 3px solid #2563eb; color: #2563eb; }
        .dark .nav-active { border-bottom-color: #60a5fa; color: #60a5fa; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [isDarkMode, setIsDarkMode] = useState(false);

            // 각 영역별 GAS URL
            const CONFIG = {
                CASH_URL: "https://script.google.com/macros/s/AKfycbwgEFaNrST7tHiaVsimiwUWzWs7h8QJtiGR7hgEYoa5Faeq9-TqZLD9QMTmZrmW2-hptg/exec",
                STOCK_URL: "https://script.google.com/macros/s/AKfycbwgEFaNrST7tHiaVsimiwUWzWs7h8QJtiGR7hgEYoa5Faeq9-TqZLD9QMTmZrmW2-hptg/exec", 
                API_KEY: "your-secret-api-key-here"
            };

            // Dark Mode Toggle Logic
            useEffect(() => {
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    setIsDarkMode(true);
                    document.documentElement.classList.add('dark');
                }
            }, []);

            const toggleDarkMode = () => {
                if (isDarkMode) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                    setIsDarkMode(false);
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                    setIsDarkMode(true);
                }
            };

            // Service Worker & PWA Install Logic
            useEffect(() => {
                if ('serviceWorker' in navigator) {
                    const swCode = `
                        self.addEventListener('install', (e) => self.skipWaiting());
                        self.addEventListener('fetch', (e) => e.respondWith(fetch(e.request)));
                    `;
                    const blob = new Blob([swCode], { type: 'application/javascript' });
                    const swUrl = URL.createObjectURL(blob);
                    navigator.serviceWorker.register(swUrl).catch(err => console.log('SW failed:', err));
                }

                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                });
            }, []);

            const handleInstallClick = async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') setDeferredPrompt(null);
            };

            const [currentView, setCurrentView] = useState('main'); 
            const [fetching, setFetching] = useState(true);
            const [cashData, setCashData] = useState({ banks: [], categories: [], recentLogs: [] });
            const [stockData, setStockData] = useState([]); 
            
            const [mockTotals, setMockTotals] = useState({
                savings: 25000000,
                pension: 8500000,
                bond: 5000000
            });

            const [cashForm, setCashForm] = useState({ bank: '', category: '', amount: '', memo: '' });
            const [loading, setLoading] = useState(false);

            const fetchCashData = async () => {
                if (!CONFIG.CASH_URL) return;
                setFetching(true);
                try {
                    const response = await fetch(`${CONFIG.CASH_URL}?key=${CONFIG.API_KEY}`);
                    const result = await response.json();
                    if (result.status !== 'error') setCashData(result);
                } catch (error) {
                    console.error("Cash data fetch error:", error);
                } finally {
                    setFetching(false);
                }
            };

            const fetchStockData = async () => {
                if (!CONFIG.STOCK_URL) return;
                setFetching(true);
                try {
                    const response = await fetch(`${CONFIG.STOCK_URL}?key=${CONFIG.API_KEY}&action=getStocks`);
                    const result = await response.json();
                    if (result.status !== 'error') {
                        setStockData(result.stocks || []);
                    }
                } catch (error) {
                    console.error("Stock data fetch error:", error);
                } finally {
                    setFetching(false);
                }
            };

            useEffect(() => {
                fetchCashData();
                fetchStockData();
            }, []);

            // 주식 합계 계산 로직 추가
            const stockSummary = useMemo(() => {
                const totalBuy = stockData.reduce((acc, curr) => acc + (Number(curr.buyPrice) * Number(curr.quantity) || 0), 0);
                const totalEval = stockData.reduce((acc, curr) => acc + (Number(curr.evalAmount) || 0), 0);
                const profit = totalEval - totalBuy;
                const profitRate = totalBuy > 0 ? (profit / totalBuy) * 100 : 0;
                return { totalBuy, totalEval, profit, profitRate };
            }, [stockData]);

            const assetStats = useMemo(() => {
                const cashTotal = cashData.recentLogs.reduce((acc, curr) => acc + Number(curr.amount || 0), 0);
                const stockTotal = stockSummary.totalEval;
                const total = cashTotal + stockTotal + mockTotals.savings + mockTotals.pension + mockTotals.bond;
                return {
                    total,
                    cash: cashTotal,
                    stock: stockTotal,
                    savings: mockTotals.savings,
                    pension: mockTotals.pension,
                    bond: mockTotals.bond
                };
            }, [cashData, stockSummary, mockTotals]);

            const handleCashSubmit = async (e) => {
                e.preventDefault();
                if (!cashForm.bank || !cashForm.category || !cashForm.amount) return;
                setLoading(true);
                try {
                    await fetch(CONFIG.CASH_URL + `?key=${CONFIG.API_KEY}`, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'add', ...cashForm }),
                    });
                    setCashForm({ bank: '', category: '', amount: '', memo: '' });
                    await fetchCashData();
                } catch (error) {
                    alert("오류가 발생했습니다.");
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [currentView, fetching, cashData, stockData, deferredPrompt, isDarkMode]);

            const menuItems = [
                { id: 'main', label: '대시보드', icon: 'layout-grid' },
                { id: 'cash', label: '입출금', icon: 'wallet' },
                { id: 'stock', label: '주식투자', icon: 'trending-up' },
                { id: 'savings', label: '예적금', icon: 'piggy-bank' },
                { id: 'pension', label: '연금저축', icon: 'coins' },
                { id: 'bond', label: '국채', icon: 'file-text' },
            ];

            return (
                <div className="min-h-screen pb-20 md:pb-0 transition-colors duration-300">
                    <nav className="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 sticky top-0 z-50 overflow-x-auto hide-scrollbar">
                        <div className="max-w-5xl mx-auto px-4 flex items-center justify-between h-16 gap-8">
                            <div className="flex items-center gap-2 font-black text-blue-600 dark:text-blue-400 text-xl flex-shrink-0">
                                <i data-lucide="shield-check"></i>
                                <span>ASSET Management</span>
                            </div>
                            <div className="flex gap-4 md:gap-8 h-full flex-shrink-0 items-center">
                                {menuItems.map(item => (
                                    <button 
                                        key={item.id}
                                        onClick={() => setCurrentView(item.id)}
                                        className={`px-1 flex items-center gap-1.5 text-sm font-bold transition-all h-full whitespace-nowrap ${currentView === item.id ? 'nav-active' : 'text-slate-400 hover:text-slate-600 dark:hover:text-slate-200'}`}
                                    >
                                        <i data-lucide={item.icon} className="w-4 h-4"></i>
                                        {item.label}
                                    </button>
                                ))}
                                <button 
                                    onClick={toggleDarkMode}
                                    className="ml-2 p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 transition-colors"
                                >
                                    <i data-lucide={isDarkMode ? "sun" : "moon"} className="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="p-4 md:p-8 max-w-5xl mx-auto">
                        {currentView === 'main' && (
                            <div className="space-y-6">
                                <div className="bg-gradient-to-br from-blue-600 to-indigo-700 dark:from-blue-700 dark:to-indigo-900 rounded-3xl p-8 text-white shadow-xl shadow-blue-200 dark:shadow-none relative">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <p className="text-blue-100 text-sm font-medium mb-1">나의 모든 자산 합계</p>
                                            <h2 className="text-4xl font-black mb-6 tracking-tight">
                                                {assetStats.total.toLocaleString()}원
                                            </h2>
                                        </div>
                                        {deferredPrompt && (
                                            <button 
                                                onClick={handleInstallClick}
                                                className="bg-white/20 hover:bg-white/30 backdrop-blur-md px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2 transition-all border border-white/10"
                                            >
                                                <i data-lucide="download" className="w-3.5 h-3.5"></i>
                                                앱 설치하기
                                            </button>
                                        )}
                                    </div>
                                    <div className="grid grid-cols-2 md:grid-cols-5 gap-4 pt-6 border-t border-white/20">
                                        <div>
                                            <p className="text-blue-200 text-xs mb-1">입출금</p>
                                            <p className="font-bold text-sm md:text-base">{assetStats.cash.toLocaleString()}원</p>
                                        </div>
                                        <div>
                                            <p className="text-blue-200 text-xs mb-1">주식투자</p>
                                            <p className="font-bold text-sm md:text-base">{assetStats.stock.toLocaleString()}원</p>
                                        </div>
                                        <div>
                                            <p className="text-blue-200 text-xs mb-1">예적금</p>
                                            <p className="font-bold text-sm md:text-base">{assetStats.savings.toLocaleString()}원</p>
                                        </div>
                                        <div>
                                            <p className="text-blue-200 text-xs mb-1">연금저축</p>
                                            <p className="font-bold text-sm md:text-base">{assetStats.pension.toLocaleString()}원</p>
                                        </div>
                                        <div>
                                            <p className="text-blue-200 text-xs mb-1">국채</p>
                                            <p className="font-bold text-sm md:text-base">{assetStats.bond.toLocaleString()}원</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm flex items-center justify-between">
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-xl flex items-center justify-center">
                                                <i data-lucide="bar-chart-3"></i>
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-slate-800 dark:text-slate-100">투자 비중</h3>
                                                <p className="text-sm text-slate-500 dark:text-slate-400">주식/채권 비중 {Math.round((assetStats.stock / assetStats.total) * 100) || 0}%</p>
                                            </div>
                                        </div>
                                        <i data-lucide="chevron-right" className="text-slate-300 dark:text-slate-600"></i>
                                    </div>
                                    <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm flex items-center justify-between">
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 rounded-xl flex items-center justify-center">
                                                <i data-lucide="zap"></i>
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-slate-800 dark:text-slate-100">자산 건전성</h3>
                                                <p className="text-sm text-slate-500 dark:text-slate-400">현금 비중 {Math.round((assetStats.cash / assetStats.total) * 100) || 0}%</p>
                                            </div>
                                        </div>
                                        <i data-lucide="chevron-right" className="text-slate-300 dark:text-slate-600"></i>
                                    </div>
                                </div>
                            </div>
                        )}

                        {currentView === 'cash' && (
                            <div className="space-y-6">
                                <section className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 p-6">
                                    <h2 className="text-lg font-bold mb-4 flex items-center gap-2 dark:text-slate-100">
                                        <i data-lucide="plus-circle" className="text-blue-500"></i>내역 기록
                                    </h2>
                                    <form onSubmit={handleCashSubmit} className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase">금융사</label>
                                            <input list="bank-list" className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 dark:text-slate-100" placeholder="예: 신한은행" value={cashForm.bank} onChange={e => setCashForm({...cashForm, bank: e.target.value})} />
                                            <datalist id="bank-list">{cashData.banks.map((b, i) => <option key={i} value={b} />)}</datalist>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase">종류</label>
                                            <input list="cat-list" className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 dark:text-slate-100" placeholder="예: 급여" value={cashForm.category} onChange={e => setCashForm({...cashForm, category: e.target.value})} />
                                            <datalist id="cat-list">{cashData.categories.map((c, i) => <option key={i} value={c} />)}</datalist>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase">금액</label>
                                            <input type="number" className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 dark:text-slate-100" placeholder="0" value={cashForm.amount} onChange={e => setCashForm({...cashForm, amount: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase">비고</label>
                                            <input className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 dark:text-slate-100" placeholder="메모" value={cashForm.memo} onChange={e => setCashForm({...cashForm, memo: e.target.value})} />
                                        </div>
                                        <button type="submit" disabled={loading} className="md:col-span-2 bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-all disabled:opacity-50">
                                            {loading ? "저장 중..." : "기록 저장하기"}
                                        </button>
                                    </form>
                                </section>

                                <section className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
                                    <div className="p-6 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center">
                                        <h2 className="text-lg font-bold dark:text-slate-100">최근 입출금 내역</h2>
                                        <button onClick={fetchCashData} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full transition-all text-slate-400">
                                            <i data-lucide="refresh-cw" className={`w-4 h-4 ${fetching ? 'animate-spin' : ''}`}></i>
                                        </button>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-sm">
                                            <thead className="bg-slate-50 dark:bg-slate-900/50 text-slate-400 font-bold text-xs uppercase">
                                                <tr><th className="px-6 py-4">금융사</th><th className="px-6 py-4">항목</th><th className="px-6 py-4 text-right">금액</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 dark:divide-slate-700">
                                                {cashData.recentLogs.map(log => (
                                                    <tr key={log.id} className="hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors text-slate-800 dark:text-slate-200">
                                                        <td className="px-6 py-4 font-bold">{log.bank}</td>
                                                        <td className="px-6 py-4 text-slate-500 dark:text-slate-400">{log.category}</td>
                                                        <td className="px-6 py-4 text-right font-black text-blue-600 dark:text-blue-400">{Number(log.amount).toLocaleString()}원</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </section>
                            </div>
                        )}

                        {currentView === 'stock' && (
                            <div className="space-y-6">
                                {/* 주식 투자 요약 대시보드 추가 */}
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div className="bg-white dark:bg-slate-800 p-5 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm">
                                        <p className="text-xs font-bold text-slate-400 mb-1">총 매입금액</p>
                                        <p className="text-xl font-black dark:text-slate-100">{stockSummary.totalBuy.toLocaleString()}원</p>
                                    </div>
                                    <div className="bg-white dark:bg-slate-800 p-5 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm">
                                        <p className="text-xs font-bold text-slate-400 mb-1">총 평가금액</p>
                                        <p className="text-xl font-black text-indigo-600 dark:text-indigo-400">{stockSummary.totalEval.toLocaleString()}원</p>
                                    </div>
                                    <div className="bg-white dark:bg-slate-800 p-5 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm">
                                        <p className="text-xs font-bold text-slate-400 mb-1">총 손익 (수익률)</p>
                                        <div className="flex items-baseline gap-2">
                                            <p className={`text-xl font-black ${stockSummary.profit >= 0 ? 'text-rose-500' : 'text-blue-500'}`}>
                                                {stockSummary.profit > 0 ? '+' : ''}{stockSummary.profit.toLocaleString()}원
                                            </p>
                                            <p className={`text-sm font-bold ${stockSummary.profit >= 0 ? 'text-rose-500' : 'text-blue-500'}`}>
                                                ({stockSummary.profitRate.toFixed(2)}%)
                                            </p>
                                        </div>
                                    </div>
                                </div>

                                <section className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
                                    <div className="p-6 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center">
                                        <h2 className="text-lg font-bold dark:text-slate-100">주식 보유 현황</h2>
                                        <button onClick={fetchStockData} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full transition-all text-slate-400">
                                            <i data-lucide="refresh-cw" className={`w-4 h-4 ${fetching ? 'animate-spin' : ''}`}></i>
                                        </button>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-sm min-w-[800px]">
                                            <thead className="bg-slate-50 dark:bg-slate-900/50 text-slate-400 font-bold text-xs uppercase">
                                                <tr>
                                                    <th className="px-6 py-4">순번</th>
                                                    <th className="px-6 py-4">증권사</th>
                                                    <th className="px-6 py-4">종목명</th>
                                                    <th className="px-6 py-4 text-right">매입금액</th>
                                                    <th className="px-6 py-4 text-right">현재가</th>
                                                    <th className="px-6 py-4 text-right">보유수량</th>
                                                    <th className="px-6 py-4 text-right">평가금액</th>
                                                    <th className="px-6 py-4">비고</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 dark:divide-slate-700">
                                                {stockData.length === 0 ? (
                                                    <tr>
                                                        <td colSpan="8" className="px-6 py-12 text-center text-slate-400">데이터가 없습니다. GAS에서 데이터를 연동해주세요.</td>
                                                    </tr>
                                                ) : stockData.map((stock, idx) => (
                                                    <tr key={idx} className="hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors text-slate-800 dark:text-slate-200">
                                                        <td className="px-6 py-4">{stock.id || idx + 1}</td>
                                                        <td className="px-6 py-4 font-bold">{stock.broker}</td>
                                                        <td className="px-6 py-4 text-blue-600 dark:text-blue-400 font-semibold">{stock.name}</td>
                                                        <td className="px-6 py-4 text-right">{Number(stock.buyPrice).toLocaleString()}</td>
                                                        <td className="px-6 py-4 text-right">{Number(stock.currentPrice).toLocaleString()}</td>
                                                        <td className="px-6 py-4 text-right">{Number(stock.quantity).toLocaleString()}</td>
                                                        <td className="px-6 py-4 text-right font-black text-indigo-600 dark:text-indigo-400">{Number(stock.evalAmount).toLocaleString()}원</td>
                                                        <td className="px-6 py-4 text-xs text-slate-500">{stock.memo}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </section>
                            </div>
                        )}

                        {['savings', 'pension', 'bond'].includes(currentView) && (
                            <div className="bg-white dark:bg-slate-800 p-20 rounded-3xl border border-slate-200 dark:border-slate-700 text-center space-y-4 shadow-sm">
                                <div className="w-20 h-20 bg-slate-50 dark:bg-slate-900 text-slate-300 dark:text-slate-700 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <i data-lucide={menuItems.find(m => m.id === currentView).icon} className="w-10 h-10"></i>
                                </div>
                                <h2 className="text-2xl font-black text-slate-800 dark:text-slate-100 tracking-tight">
                                    {menuItems.find(m => m.id === currentView).label} 영역 준비 중
                                </h2>
                                <p className="text-slate-500 dark:text-slate-400 max-w-xs mx-auto">해당 기능은 현재 개발 중입니다. 곧 백엔드 연동과 함께 업데이트될 예정입니다.</p>
                                <button onClick={() => setCurrentView('main')} className="mt-6 text-blue-600 dark:text-blue-400 font-bold flex items-center gap-2 mx-auto hover:underline transition-all">
                                    <i data-lucide="arrow-left" className="w-4 h-4"></i> 대시보드로 돌아가기
                                </button>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
